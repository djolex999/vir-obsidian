name: Release Obsidian plugin

on:
  push:
    # Obsidian requires the release tag to exactly match manifest.json's version — NO "v" prefix.
    # First char must be a digit so v-prefixed tags never match.
    tags:
      - "[0-9]+.[0-9]+.[0-9]+" # 0.1.0, 1.0.0
      - "[0-9]+.[0-9]+.[0-9]+-*" # 0.1.0-rc.1 and other prereleases

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          PRERELEASE=""
          case "$TAG" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            $PRERELEASE \
            main.js manifest.json styles.css
